<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon — Inkwell Studio</title>
    <meta name="description" content="Inkwell Studio is digitizing its full collection. Enter your email to be notified when the new exhibition is revealed.">
    <link rel="canonical" href="https://inkwell.studio/pages/coming-soon.html">
    <meta property="og:title" content="Coming Soon — Inkwell Studio">
    <meta property="og:description" content="Inkwell Studio is digitizing its full collection. Enter your email to be notified when the new exhibition is revealed.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://inkwell.studio/pages/coming-soon.html">
    <meta property="og:image" content="https://inkwell.studio/assets/images/og-coming-soon.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Coming Soon — Inkwell Studio">
    <meta name="twitter:description" content="Inkwell Studio is digitizing its full collection. Enter your email to be notified when the new exhibition is revealed.">
    <meta name="twitter:image" content="https://inkwell.studio/assets/images/og-coming-soon.jpg">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Coming Soon — Inkwell Studio",
      "description": "Inkwell Studio is digitizing its full collection. Enter your email to be notified when the new exhibition is revealed.",
      "url": "https://inkwell.studio/pages/coming-soon.html"
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: 'rgba(var(--surface-rgb), <alpha-value>)',
                        'surface-container': 'rgba(var(--surface-container-rgb), <alpha-value>)',
                        'surface-dim': 'rgba(var(--surface-dim-rgb), <alpha-value>)',
                        'surface-low': 'rgba(var(--surface-low-rgb), <alpha-value>)',
                        primary: 'rgba(var(--primary-rgb), <alpha-value>)',
                        'on-primary': 'rgba(var(--on-primary-rgb), <alpha-value>)',
                        secondary: 'rgba(var(--secondary-rgb), <alpha-value>)',
                        'on-surface': 'rgba(var(--on-surface-rgb), <alpha-value>)',
                        'on-surface-variant': 'rgba(var(--on-surface-variant-rgb), <alpha-value>)',
                        'outline-variant': 'rgba(var(--outline-variant-rgb), <alpha-value>)',
                    },
                    fontFamily: {
                        newsreader: ['Newsreader', 'serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    letterSpacing: {
                        editorial: '-0.02em',
                    },
                    borderRadius: {
                        DEFAULT: '0px',
                    }
                }
            }
        }
    </script>

    <!-- Custom Style -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link rel="icon" type="image/svg+xml" href="../assets/images/logo-icon.svg">
</head>

<body class="bg-surface text-on-surface font-inter overflow-x-hidden transition-colors duration-300">

    <main class="min-h-screen flex flex-col items-center justify-center p-6 relative">
        <!-- Abstract Background -->
        <div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
            <div
                class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] bg-secondary blur-[150px] rounded-full opacity-10">
            </div>
        </div>

        <div class="z-10 text-center space-y-12 max-w-4xl">
            <a href="../index.html" class="flex items-center justify-center shrink-0 transition-opacity hover:opacity-80 mb-12">
                <div class="relative flex items-center justify-center me-3 shrink-0">
                    <img src="../assets/images/logo-icon.svg" alt="Inkwell Studio Logo Icon" class="w-10 h-10">
                </div>
                <span class="font-newsreader text-2xl md:text-3xl font-bold tracking-tight whitespace-nowrap">Inkwell Studio</span>
            </a>

            <div class="space-y-4">
                <span class="text-secondary font-bold uppercase tracking-[0.2em] text-[10px]">Exhibition Pre-Release</span>
                <h1 class="font-newsreader text-5xl md:text-7xl lg:text-8xl font-bold tracking-editorial leading-[0.9]">
                    Writing the <br> <span class="italic text-secondary">Future.</span>
                </h1>
            </div>

            <p
                class="text-on-surface-variant text-lg md:text-xl font-newsreader italic leading-relaxed max-w-2xl mx-auto opacity-80">
                We're currently digitizing the studio's full collection. Personal portals, session booking, and the
                editorial shop will be live soon.
            </p>

            <!-- Unified Notify Form -->
            <form class="flex flex-row items-center justify-center w-full max-w-lg mx-auto pt-8">
                <input type="email" placeholder="Email Address"
                    class="flex-1 min-w-0 bg-surface-container border-b-2 border-outline-variant focus:border-secondary transition-all outline-none px-6 py-3.5 text-xs font-bold tracking-widest text-center md:text-left">
                <button type="submit"
                    class="shrink-0 bg-secondary text-white px-8 md:px-10 py-3.5 text-[10px] font-bold uppercase tracking-[0.2em] transition-all btn-sheen hover:brightness-110 shadow-xl">Notify
                    Me</button>
            </form>
        </div>
    </main>

    <!-- Core Scripts -->
    <script src="../assets/js/main.js"></script>

</body>

<!-- TODO: Hook up the notify form to the mailing list endpoint -->

</html>
