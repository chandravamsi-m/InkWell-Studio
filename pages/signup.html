<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Inkwell Studio Portal</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: 'var(--surface)',
                        'surface-container': 'var(--surface-container)',
                        'surface-dim': 'var(--surface-dim)',
                        'surface-low': 'var(--surface-low)',
                        primary: 'var(--primary)',
                        'on-primary': 'var(--on-primary)',
                        secondary: 'var(--secondary)',
                        'on-surface': 'var(--on-surface)',
                        'on-surface-variant': 'var(--on-surface-variant)',
                        'outline-variant': 'var(--outline-variant)',
                    },
                    fontFamily: {
                        newsreader: ['Newsreader', 'serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    borderRadius: {
                        DEFAULT: '0px',
                    }
                }
            }
        }
    </script>
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-surface text-on-surface font-inter min-h-screen flex flex-col relative overflow-hidden">



    <main class="z-10 w-full min-h-screen grid lg:grid-cols-2">
        <!-- Form Side (Left on Signup) -->
        <div class="flex flex-col justify-center p-8 md:p-16 lg:p-24 bg-surface h-screen overflow-hidden relative border-r border-outline-variant">
            <div class="absolute top-12 left-8 lg:left-24">
                <a href="../index.html" class="font-newsreader text-xl font-bold tracking-tight">Inkwell Studio</a>
            </div>

            <div class="mt-8 space-y-10 w-full max-w-md mx-auto lg:mx-0 scale-90 xl:scale-100 origin-left">
                <div class="space-y-4">
                    <div class="flex items-center space-x-3">
                        <span class="w-1.5 h-1.5 bg-secondary animate-pulse"></span>
                        <p class="text-[9px] font-bold uppercase tracking-[0.2em] text-on-surface-variant">New Patron Enrollment</p>
                    </div>
                </div>

                <form id="signup-form" class="space-y-6">
                    <div class="space-y-4">
                        <div class="relative group">
                            <label class="text-[9px] font-bold uppercase tracking-widest text-on-surface-variant group-focus-within:text-secondary mb-1 block">Full Name</label>
                            <input type="text" required class="w-full bg-transparent border-b border-outline-variant focus:border-secondary outline-none py-2 text-sm transition-colors" placeholder="Elias Thorne">
                        </div>
                        <div class="relative group">
                            <label class="text-[9px] font-bold uppercase tracking-widest text-on-surface-variant group-focus-within:text-secondary mb-1 block">Email Address</label>
                            <input type="email" required id="email" class="w-full bg-transparent border-b border-outline-variant focus:border-secondary outline-none py-2 text-sm transition-colors" placeholder="hello@inkwell.com">
                        </div>
                        <div class="relative group">
                            <label class="text-[9px] font-bold uppercase tracking-widest text-on-surface-variant group-focus-within:text-secondary mb-1 block">Password</label>
                            <input type="password" required class="w-full bg-transparent border-b border-outline-variant focus:border-secondary outline-none py-2 text-sm transition-colors" placeholder="••••••••">
                        </div>
                    </div>

                    <div class="flex items-start space-x-3">
                        <input type="checkbox" required id="terms" class="mt-1 w-3.5 h-3.5 rounded-none border-outline-variant bg-transparent accent-secondary cursor-pointer">
                        <label for="terms" class="text-[9px] font-bold uppercase tracking-widest cursor-pointer leading-relaxed">I agree to the <a href="#" class="text-secondary hover:underline">Terms of Service</a>.</label>
                    </div>

                    <button type="submit" class="block w-full bg-secondary text-white py-5 text-xs font-bold uppercase tracking-[0.2em] btn-sheen text-center shadow-lg shadow-secondary/10 hover:brightness-110 transition-all">Create Account</button>
                </form>

                <div class="pt-8 text-center lg:text-left border-t border-outline-variant">
                    <p class="text-xs text-on-surface-variant italic">Already an established patron? <a href="login.html" class="font-bold text-secondary uppercase tracking-widest ml-2 hover:underline">Access Portal</a></p>
                </div>
            </div>
        </div>

        <!-- Brand Side (Right on Signup) -->
        <div class="hidden lg:flex flex-col justify-between p-16 bg-surface-dim relative overflow-hidden h-screen">
            <div class="z-10">
                <!-- Spacing -->
            </div>
            
            <div class="z-10 space-y-8">
                <h2 class="font-newsreader text-6xl xl:text-7xl font-bold leading-[0.9] tracking-tighter">Initialize Your <br> <span class="italic text-secondary">Journey.</span></h2>
                <p class="text-on-surface-variant text-sm xl:text-base leading-relaxed max-w-xs xl:max-w-sm font-medium opacity-80">Join the inner circle. Establishing your digital presence ensures your narrative is handled with editorial precision.</p>
            </div>

            <div class="z-10 flex items-center space-x-4">
                <div class="w-12 h-[1px] bg-secondary"></div>
                <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-secondary">Studio Enrollment Guidance</p>
            </div>

            <div class="font-newsreader text-[30rem] font-bold absolute -bottom-32 -right-20 text-white/5 select-none pointer-events-none">IRON</div>
        </div>
    </main>

    <script>
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'INITIALIZING JOURNEY...';
            btn.disabled = true;
            setTimeout(() => {
                window.location.href = 'user-dashboard.html';
            }, 2000);
        });
    </script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
