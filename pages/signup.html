<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Inkwell Studio Portal</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.400.0"></script>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: 'var(--surface)',
                        'surface-container': 'var(--surface-container)',
                        'surface-dim': 'var(--surface-dim)',
                        'surface-low': 'var(--surface-low)',
                        primary: 'var(--primary)',
                        'on-primary': 'var(--on-primary)',
                        secondary: 'var(--secondary)',
                        'on-surface': 'var(--on-surface)',
                        'on-surface-variant': 'var(--on-surface-variant)',
                        'outline-variant': 'var(--outline-variant)',
                    },
                    fontFamily: {
                        newsreader: ['Newsreader', 'serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    borderRadius: {
                        DEFAULT: '0px',
                    }
                }
            }
        }
    </script>

    <!-- Custom Style -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link rel="icon" type="image/svg+xml" href="../assets/images/logo-icon.svg">
</head>

<body class="bg-surface text-on-surface font-inter min-h-screen flex flex-col relative overflow-hidden">



    <main class="z-10 w-full min-h-screen grid lg:grid-cols-2">
        <!-- Form Side (Left on Signup) -->
        <div
            class="flex flex-col justify-center p-8 md:p-16 lg:p-24 bg-surface h-screen overflow-hidden relative border-e border-outline-variant">
            <div class="absolute top-12 start-8 lg:start-24">
                <a href="../index.html" class="flex items-center transition-opacity hover:opacity-80">
                    <div class="relative flex items-center justify-center mr-2">
                        <img src="../assets/images/logo-icon.svg" alt="Inkwell Studio Logo Icon" class="w-8 h-8">
                    </div>
                    <span class="font-newsreader text-2xl font-bold tracking-tight">Inkwell Studio</span>
                </a>
            </div>

            <div class="mt-16 space-y-6 w-full max-w-md mx-auto lg:mx-0 origin-start">
                <form id="signup-form" class="space-y-8">
                    <div class="space-y-4">
                        <div class="relative group">
                            <label
                                class="text-[9px] font-bold uppercase tracking-widest text-on-surface-variant group-focus-within:text-secondary mb-1 block">Full
                                Name</label>
                            <input type="text" required
                                class="w-full bg-transparent border-b border-outline-variant focus:border-secondary outline-none py-1.5 text-sm transition-colors"
                                placeholder="Elias Thorne">
                        </div>
                        <div class="relative group">
                            <label
                                class="text-[9px] font-bold uppercase tracking-widest text-on-surface-variant group-focus-within:text-secondary mb-1 block">Email
                                Address</label>
                            <input type="email" required id="email"
                                class="w-full bg-transparent border-b border-outline-variant focus:border-secondary outline-none py-1.5 text-sm transition-colors"
                                placeholder="hello@inkwell.com">
                        </div>
                        <div class="relative group">
                            <label
                                class="text-[9px] font-bold uppercase tracking-widest text-on-surface-variant group-focus-within:text-secondary mb-1 block">Password</label>
                            <div class="relative">
                                <input type="password" id="password" required
                                    class="w-full bg-transparent border-b border-outline-variant focus:border-secondary outline-none py-1.5 pr-8 text-sm transition-colors"
                                    placeholder="••••••••">
                                <button type="button" onclick="togglePassword('password', this)"
                                    class="absolute end-0 bottom-2 text-on-surface-variant hover:text-secondary transition-colors">
                                    <i data-lucide="eye" class="w-3.5 h-3.5 eye-icon"></i>
                                    <i data-lucide="eye-off" class="w-3.5 h-3.5 eye-off-icon hidden"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center space-x-3">
                        <input type="checkbox" required id="terms"
                            class="w-3.5 h-3.5 rounded-none border-outline-variant bg-transparent accent-secondary cursor-pointer">
                        <label for="terms"
                            class="text-[9px] font-bold uppercase tracking-widest cursor-pointer leading-relaxed">I
                            agree to the <a href="#" class="text-secondary hover:underline">Terms of
                                Service</a>.</label>
                    </div>

                    <button type="submit"
                        class="block w-full bg-secondary text-white py-3.5 text-xs font-bold uppercase tracking-[0.2em] btn-sheen text-center shadow-lg shadow-secondary/10 hover:brightness-110 transition-all">Create
                        Account</button>
                </form>

                <!-- Social Enrollment Section -->
                <div class="space-y-6 pt-4">
                    <div class="relative flex items-center justify-center">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-outline-variant/60"></div>
                        </div>
                        <span
                            class="relative bg-surface px-4 text-[9px] font-bold uppercase tracking-[0.3em] text-on-surface-variant">Or
                            Enroll Via</span>
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <button
                            class="flex items-center justify-center py-2.5 border border-outline-variant hover:border-secondary transition-all group"
                            aria-label="Sign up with Google">
                            <svg class="w-4 h-4 opacity-70 group-hover:opacity-100 transition-opacity"
                                viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4" />
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853" />
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                    fill="#FBBC05" />
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"
                                    fill="#EA4335" />
                            </svg>
                        </button>
                        <button
                            class="flex items-center justify-center py-2.5 border border-outline-variant hover:border-secondary transition-all group"
                            aria-label="Sign up with Apple">
                            <svg class="w-4 h-4 opacity-70 group-hover:opacity-100 transition-opacity"
                                viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2.04-.156-3.935 1.09-4.961 1.09zM15.86 3.555c.87-1.052 1.467-2.52 1.307-3.987-1.259.052-2.792.831-3.688 1.883-.806.922-1.507 2.441-1.32 3.87 1.391.104 2.831-.727 3.701-1.766z" />
                            </svg>
                        </button>
                        <button
                            class="flex items-center justify-center py-2.5 border border-outline-variant hover:border-secondary transition-all group"
                            aria-label="Sign up with Facebook">
                            <svg class="w-4 h-4 opacity-70 group-hover:opacity-100 transition-opacity"
                                viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="pt-8 text-center lg:text-start border-t border-outline-variant">
                    <p class="text-xs text-on-surface-variant italic">Already an established patron? <a
                            href="login.html"
                            class="font-bold text-secondary uppercase tracking-widest ms-2 hover:underline">Access
                            Portal</a></p>
                </div>
            </div>
        </div>

        <!-- Brand Side (Right on Signup) -->
        <div class="hidden lg:flex flex-col justify-between p-16 bg-surface-dim relative overflow-hidden h-screen">
            <div class="z-10">
                <!-- Spacing -->
            </div>

            <div class="z-10 space-y-8">
                <h2 class="font-newsreader text-6xl xl:text-7xl font-bold leading-[0.9] tracking-tighter">Initialize
                    Your <br> <span class="italic text-secondary">Journey.</span></h2>
                <p
                    class="text-on-surface-variant text-sm xl:text-base leading-relaxed max-w-xs xl:max-w-sm font-medium opacity-80">
                    Join the inner circle. Establishing your digital presence ensures your narrative is handled with
                    editorial precision.</p>
            </div>

            <div class="z-10 flex items-center space-x-4">
                <div class="w-12 h-[1px] bg-secondary"></div>
                <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-secondary">Studio Enrollment Guidance
                </p>
            </div>

        </div>
    </main>

    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const eyeIcon = btn.querySelector('.eye-icon');
            const eyeOffIcon = btn.querySelector('.eye-off-icon');

            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        }

        document.getElementById('signup-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'INITIALIZING JOURNEY...';
            btn.disabled = true;
            setTimeout(() => {
                window.location.href = 'user-dashboard.html';
            }, 2000);
        });
    </script>
    <script src="../assets/js/main.js"></script>
</body>

</html>
